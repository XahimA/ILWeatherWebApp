<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IL Weather Alert - ICICI Lombard</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #000000;
        min-height: 100vh;
        padding: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .container {
        max-width: 420px;
        width: 100%;
    }

    .logo {
        text-align: center;
        margin-bottom: 16px;
        color: white;
        font-size: 20px;
        font-weight: 700;
        text-shadow: 0 2px 10px rgba(0,0,0,0.2);
    }

    .card {
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 20px;
        border-radius: 20px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2),
                    0 0 0 1px rgba(255, 255, 255, 0.1) inset;
        max-height: calc(100vh - 100px);
        overflow-y: auto;
    }

    h2 {
        font-size: 18px;
        margin-bottom: 16px;
        color: #002d62;
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .form-row {
        display: flex;
        gap: 10px;
    }

    .form-group {
        margin-bottom: 14px;
        flex: 1;
    }

    label {
        font-size: 12px;
        font-weight: 600;
        margin-bottom: 5px;
        display: block;
        color: #002d62;
    }

    input, textarea, select {
        width: 100%;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1.5px solid rgba(0, 45, 98, 0.2);
        font-size: 14px;
        background: rgba(255, 255, 255, 0.9);
        transition: all 0.3s ease;
        font-family: inherit;
    }

    input:focus, textarea:focus {
        outline: none;
        border-color: #f26522;
        background: white;
        box-shadow: 0 0 0 3px rgba(242, 101, 34, 0.1);
    }

    textarea {
        resize: vertical;
        min-height: 60px;
    }

    .radio-group {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
    }

    .radio-item {
        flex: 1;
        min-width: fit-content;
    }

    .radio-item input[type="radio"] {
        display: none;
    }

    .radio-item label {
        display: block;
        padding: 8px 12px;
        background: rgba(0, 68, 148, 0.08);
        border: 1.5px solid rgba(0, 68, 148, 0.2);
        border-radius: 8px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s ease;
        font-weight: 600;
        font-size: 11px;
        color: #004494;
        margin: 0;
    }

    .radio-item input[type="radio"]:checked + label {
        background: linear-gradient(135deg, #f26522 0%, #ff8247 100%);
        border-color: #f26522;
        color: white;
        box-shadow: 0 4px 12px rgba(242, 101, 34, 0.3);
    }

    .btn {
        width: 100%;
        padding: 12px;
        background: linear-gradient(135deg, #f26522 0%, #ff8247 100%);
        color: white;
        font-weight: 700;
        font-size: 14px;
        border: none;
        border-radius: 10px;
        margin-top: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 4px 16px rgba(242, 101, 34, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
    }

    .btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(242, 101, 34, 0.4);
    }

    .btn:active:not(:disabled) {
        transform: translateY(0);
    }

    .btn:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .location-btn {
        background: linear-gradient(135deg, #004494 0%, #0066cc 100%);
        box-shadow: 0 4px 16px rgba(0, 68, 148, 0.3);
        margin-bottom: 12px;
    }

    .location-btn:hover:not(:disabled) {
        box-shadow: 0 6px 20px rgba(0, 68, 148, 0.4);
    }

    .alert {
        padding: 10px 12px;
        margin-bottom: 12px;
        border-radius: 10px;
        font-size: 12px;
        text-align: center;
        font-weight: 600;
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        animation: slideDown 0.3s ease;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .alert.success {
        background: rgba(212, 237, 218, 0.95);
        color: #155724;
        border: 1.5px solid rgba(21, 87, 36, 0.2);
    }

    .alert.error {
        background: rgba(248, 215, 218, 0.95);
        color: #721c24;
        border: 1.5px solid rgba(114, 28, 36, 0.2);
    }

    .alert.info {
        background: rgba(209, 236, 241, 0.95);
        color: #0c5460;
        border: 1.5px solid rgba(12, 84, 96, 0.2);
    }

    .spinner {
        border: 2px solid rgba(255,255,255,0.3);
        border-top: 2px solid white;
        border-radius: 50%;
        width: 14px;
        height: 14px;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    .required {
        color: #f26522;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
        -webkit-appearance: none;
        margin: 0;
    }

    input[type="number"] {
        -moz-appearance: textfield;
    }

    @media (max-width: 480px) {
        body {
            padding: 12px;
        }

        .card {
            padding: 16px;
        }
    }
</style>
</head>

<body>
<div class="container">
    <div class="logo">🌦️ ICICI Weather Alert</div>

    <div id="alertBox"></div>

    <div class="card">
        <h2>📝 Weather Alert Form</h2>

        <form id="proForm">

            <!-- LOCATION BUTTON -->
            <button type="button" class="btn location-btn" id="locationBtn">
                <span>📍 Get My Location</span>
            </button>

            <!-- LAT + LONG INLINE -->
            <div class="form-row">
                <div class="form-group">
                    <label>Latitude <span class="required">*</span></label>
                    <input id="lat" type="number" step="any" placeholder="19.0760">
                </div>

                <div class="form-group">
                    <label>Longitude <span class="required">*</span></label>
                    <input id="long" type="number" step="any" placeholder="72.8777">
                </div>
            </div>

            <!-- RAINFALL INTENSITY (changed from Weather Type) -->
            <div class="form-group">
                <label>Rainfall Intensity <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" name="type" value="No Rain" id="rain0">
                        <label for="rain0">No Rain</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="type" value="Normal Rain" id="rain1">
                        <label for="rain1">Normal Rain</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="type" value="Heavy Rain" id="rain2">
                        <label for="rain2">Heavy Rain</label>
                    </div>
                </div>
            </div>

            <!-- WIND INTENSITY -->
            <div class="form-group">
                <label>Wind Intensity <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" name="wind" value="Low (up to 15 km/h)" id="wind1">
                        <label for="wind1">Low<br><small style="font-size:10px; opacity:0.8;">≤15 km/h</small></label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="wind" value="Moderate (15-30 km/h)" id="wind2">
                        <label for="wind2">Moderate<br><small style="font-size:10px; opacity:0.8;">15-30 km/h</small></label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="wind" value="Strong (30-50 km/h)" id="wind3">
                        <label for="wind3">Strong<br><small style="font-size:10px; opacity:0.8;">30-50 km/h</small></label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="wind" value="Storm/Cyclone (>50 km/h)" id="wind4">
                        <label for="wind4">Storm<br><small style="font-size:10px; opacity:0.8;">>50 km/h</small></label>
                    </div>
                </div>
            </div>

            <!-- VISIBILITY LEVELS -->
            <div class="form-group">
                <label>Visibility Level <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" name="visibility" value="Clear (>1 km)" id="vis1">
                        <label for="vis1">Clear<br><small style="font-size:10px; opacity:0.8;">>1 km</small></label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="visibility" value="Mist (500-1000 m)" id="vis2">
                        <label for="vis2">Mist<br><small style="font-size:10px; opacity:0.8;">500-1000m</small></label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="visibility" value="Moderate Fog (200-500 m)" id="vis3">
                        <label for="vis3">Mod Fog<br><small style="font-size:10px; opacity:0.8;">200-500m</small></label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="visibility" value="Dense Fog (<200 m)" id="vis4">
                        <label for="vis4">Dense Fog<br><small style="font-size:10px; opacity:0.8;"><200m</small></label>
                    </div>
                </div>
            </div>

            <!-- WATER LOGGED - Side by side in single row -->
            <div class="form-group">
                <label>Water Logged <span class="required">*</span></label>
                <div class="radio-group">
                    <div class="radio-item">
                        <input type="radio" name="log" value="Yes" id="log1">
                        <label for="log1">Yes</label>
                    </div>
                    <div class="radio-item">
                        <input type="radio" name="log" value="No" id="log2">
                        <label for="log2">No</label>
                    </div>
                </div>
            </div>

            <!-- NAME + PHONE INLINE -->
            <div class="form-row">
                <div class="form-group">
                    <label>Reporter Name <span class="required">*</span></label>
                    <input id="name" placeholder="Enter name">
                </div>

                <div class="form-group">
                    <label>Phone Number <span class="required">*</span></label>
                    <input id="phno" type="tel" placeholder="10 digits" maxlength="10" pattern="[0-9]{10}">
                </div>
            </div>

            <!-- NOTES -->
            <div class="form-group">
                <label>Additional Notes <span class="required">*</span></label>
                <textarea id="add" placeholder="Describe weather conditions..."></textarea>
            </div>

            <button class="btn" type="submit" id="submitBtn">
                <span id="submitText">🚨 Submit Alert</span>
            </button>
        </form>
    </div>
</div>

<script>
const API_ENDPOINT = "httpy";
const KEY = "-V3nmiotv4hKMbTlDyuKeAzFuv_PVNw==";

let isSubmitting = false;

function showAlert(msg, type) {
    const box = document.getElementById("alertBox");
    box.innerHTML = `<div class="alert ${type}">${msg}</div>`;
    setTimeout(() => box.innerHTML = "", 5000);
}

function validateForm() {
    const lat = document.getElementById("lat").value.trim();
    const long = document.getElementById("long").value.trim();
    const type = document.querySelector("input[name='type']:checked");
    const wind = document.querySelector("input[name='wind']:checked");
    const visibility = document.querySelector("input[name='visibility']:checked");
    const log = document.querySelector("input[name='log']:checked");
    const name = document.getElementById("name").value.trim();
    const phno = document.getElementById("phno").value.trim();
    const add = document.getElementById("add").value.trim();

    if (!lat || !long) {
        showAlert("⚠️ Please enter latitude and longitude", "error");
        return false;
    }

    if (!type) {
        showAlert("⚠️ Please select rainfall intensity", "error");
        return false;
    }

    if (!wind) {
        showAlert("⚠️ Please select wind intensity", "error");
        return false;
    }

    if (!visibility) {
        showAlert("⚠️ Please select visibility level", "error");
        return false;
    }

    if (!log) {
        showAlert("⚠️ Please select water logged status", "error");
        return false;
    }

    if (!name) {
        showAlert("⚠️ Please enter your name", "error");
        return false;
    }

    if (!phno) {
        showAlert("⚠️ Please enter phone number", "error");
        return false;
    }

    if (phno.length !== 10 || !/^\d{10}$/.test(phno)) {
        showAlert("⚠️ Phone number must be exactly 10 digits", "error");
        return false;
    }

    if (!add) {
        showAlert("⚠️ Please add additional notes", "error");
        return false;
    }

    return true;
}

document.getElementById("locationBtn").addEventListener("click", function() {
    const btn = this;
    btn.disabled = true;
    btn.innerHTML = '<div class="spinner"></div><span>Getting Location...</span>';
    
    showAlert("📍 Getting your location...", "info");
    
    navigator.geolocation.getCurrentPosition(
        pos => {
            document.getElementById("lat").value = pos.coords.latitude.toFixed(6);
            document.getElementById("long").value = pos.coords.longitude.toFixed(6);
            showAlert("✅ Location fetched successfully!", "success");
            btn.disabled = false;
            btn.innerHTML = '<span>📍 Get My Location</span>';
        },
        err => {
            showAlert("❌ " + err.message, "error");
            btn.disabled = false;
            btn.innerHTML = '<span>📍 Get My Location</span>';
        }
    );
});

document.getElementById("phno").addEventListener("input", function(e) {
    this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);
});

document.getElementById("proForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    if (isSubmitting) return;

    if (!validateForm()) return;

    isSubmitting = true;
    const submitBtn = document.getElementById("submitBtn");
    const submitText = document.getElementById("submitText");
    
    submitBtn.disabled = true;
    submitText.innerHTML = '<div class="spinner"></div><span>Submitting...</span>';

    const data = {
        lat: parseFloat(document.getElementById("lat").value),
        long: parseFloat(document.getElementById("long").value),
        type: document.querySelector("input[name='type']:checked").value,
        wind: document.querySelector("input[name='wind']:checked").value,
        visibility: document.querySelector("input[name='visibility']:checked").value,
        log: document.querySelector("input[name='log']:checked").value,
        name: document.getElementById("name").value,
        phno: document.getElementById("phno").value,
        add: document.getElementById("add").value
    };

    try {
        const res = await fetch(API_ENDPOINT, {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "x-functions-key": KEY
            },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if (result.status === "success") {
            showAlert("✅ Alert submitted successfully!", "success");
            document.getElementById("proForm").reset();
        } else {
            showAlert("❌ Error: " + (result.error || "Something went wrong"), "error");
        }
    } catch (error) {
        showAlert("❌ Network error. Please try again.", "error");
    } finally {
        isSubmitting = false;
        submitBtn.disabled = false;
        submitText.innerHTML = '🚨 Submit Alert';
    }
});
</script>

</body>
</html>
